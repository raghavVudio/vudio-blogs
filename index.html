<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <meta name="description" content="" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #000000;
      --accent-10:  #00000012;
      --accent-30:  #00000030;
      --bg:         #F9F9F7;
      --bg2:        #F2F1ED;
      --surface:    #FFFFFF;
      --border:     #E6E3DC;
      --border2:    #CEC9BE;
      --text:       #1C1A17;
      --text2:      #3A3830;
      --muted:      #7A776E;
      --dim:        #252524;
      --faint:      #D5D2C8;  
      --font-head:  Georgia, serif;
      --font-body:  system-ui, sans-serif;
      --font-mono:  'Courier New', monospace;
      --r:          10px;
      --shad:       0 1px 6px rgba(0,0,0,0.05);
      --shad-h:     0 6px 24px rgba(0,0,0,0.10);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent-10); }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── PROGRESS ── */
    #prog {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: var(--accent); z-index: 300; pointer-events: none;
      transition: width 0.1s linear;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; z-index: 999;
      transition: opacity 0.3s;
    }
    #loading.out { opacity: 0; pointer-events: none; }
    .ring {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--border2); border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    #load-msg { font-size: 12px; color: var(--dim); font-family: var(--font-mono); }

    /* ── ERROR ── */
    #err {
      display: none; position: fixed; inset: 0; background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 40px; text-align: center;
    }
    #err.show { display: flex; }
    #err h2 { font-size: 22px; }
    #err p  { font-size: 13px; color: var(--muted); max-width: 400px; line-height: 1.6; }
    #err a  {
      font-size: 12px; font-family: var(--font-mono); color: var(--text);
      border: 1px solid var(--border2); padding: 8px 18px;
      border-radius: 5px; text-decoration: none; margin-top: 4px;
    }

    /* ══ HEADER ══ */
    #hdr {
      position: sticky; top: 0; z-index: 200; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 93%, transparent); backdrop-filter: blur(16px);
    }
    .hdr-l { display: flex; align-items: center; gap: 14px; }
    .hdr-r { display: flex; align-items: center; gap: 12px; }
    #hdr-logo { height: 26px; width: auto; max-width: 110px; object-fit: contain; display: none; }
    #hdr-name { font-size: 17px; font-weight: 700; display: none; }
    .hdr-sep  { color: var(--faint); font-size: 18px; }
    .hdr-lbl  { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .powered  {
      font-family: var(--font-mono); font-size: 11px; color: var(--dim);
      border: 1px solid var(--border2); padding: 3px 10px; border-radius: 4px;
    }
    #back-btn {
      display: none; font-family: var(--font-mono); font-size: 12px;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: color .15s; padding: 0;
    }
    #back-btn:hover { color: var(--text); }
    #back-btn.on { display: block; }

    /* ══════════════════════════════
       LISTING
    ══════════════════════════════ */
    #list-view { display: none; }
    #list-view.on { display: block; }

    .l-hero {
      max-width: 1100px; margin: 0 auto;
      padding: 60px 48px 44px; border-bottom: 1px solid var(--border);
    }
    .l-eye {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .l-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .l-eye span {
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .l-hero h1 {
      font-family: var(--font-head); font-size: clamp(30px,4.5vw,56px);
      font-weight: 700; line-height: 1.08; letter-spacing: -.02em; margin-bottom: 12px;
    }
    .l-hero p { color: var(--muted); font-size: 15px; line-height: 1.7; max-width: 480px; }

    .l-ctrl {
      max-width: 1100px; margin: 0 auto; padding: 22px 48px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; border-bottom: 1px solid var(--border);
    }
    .srch {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 14px; width: 250px;
      box-shadow: var(--shad); transition: border-color .2s;
    }
    .srch:focus-within { border-color: var(--accent); }
    .srch svg { flex-shrink: 0; color: var(--dim); }
    .srch input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 13px; flex: 1;
      font-family: var(--font-body);
    }
    .srch input::placeholder { color: var(--faint); }
    #filters { display: flex; flex-wrap: wrap; gap: 6px; }
    .f-btn {
      padding: 5px 14px; border-radius: 4px; cursor: pointer;
      font-size: 12px; font-family: var(--font-mono);
      border: 1px solid var(--border2); background: transparent;
      color: var(--muted); transition: all .15s;
    }
    .f-btn:hover { border-color: var(--accent); color: var(--accent); }
    .f-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    .l-main { max-width: 1100px; margin: 0 auto; padding: 28px 48px 80px; }

    /* Featured */
    .feat {
      display: grid; grid-template-columns: 5fr 4fr;
      border: 1px solid var(--border); border-radius: var(--r);
      overflow: hidden; margin-bottom: 22px; cursor: pointer;
      background: var(--surface); box-shadow: var(--shad);
      transition: box-shadow .2s, transform .2s;
    }
    .feat:hover { box-shadow: var(--shad-h); transform: translateY(-2px); }
    .feat-body { padding: 36px; display: flex; flex-direction: column; }
    .f-tag {
      font-family: var(--font-mono); font-size: 10px; color: var(--accent);
      border: 1px solid var(--accent-30); padding: 3px 10px;
      border-radius: 3px; margin-bottom: 14px; width: fit-content;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .feat-body h2 {
      font-family: var(--font-head); font-size: clamp(19px,2vw,26px);
      font-weight: 700; line-height: 1.22; margin-bottom: 12px;
    }
    .feat-body p { font-size: 14px; color: var(--muted); line-height: 1.72; flex: 1; }
    .feat-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 22px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .f-date, .f-time { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    .f-sep { color: var(--faint); }
    .f-read { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
    .feat-vis {
      background: var(--bg2); position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; min-height: 240px;
    }
    .feat-vis img { width:100%; height:100%; object-fit:cover; display:block; transition: transform .4s; }
    .feat:hover .feat-vis img { transform: scale(1.03); }
    .feat-vis .no-img { font-size: 72px; color: var(--accent); opacity: .07; }
    .new-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--accent); color: #fff;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 3px;
    }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; cursor: pointer;
      display: flex; flex-direction: column; box-shadow: var(--shad);
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: var(--shad-h); transform: translateY(-3px); }
    .card-img { height: 170px; background: var(--bg2); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .card-img img { width:100%; height:100%; object-fit:cover; transition: transform .35s; }
    .card:hover .card-img img { transform: scale(1.04); }
    .card-no-img { font-size: 44px; color: var(--accent); opacity: .08; }
    .card-body { padding: 20px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .c-tag { font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; }
    .c-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; line-height: 1.3; color: var(--text2); transition: color .15s; }
    .card:hover .c-title { color: var(--text); }
    .c-exc { font-size: 13px; color: var(--muted); line-height: 1.65; flex: 1; }
    .c-foot {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; border-top: 1px solid var(--border); margin-top: 6px;
    }
    .c-date { font-family: var(--font-mono); font-size: 10px; color: var(--dim); }
    .c-arr  { font-family: var(--font-mono); font-size: 12px; color: var(--dim); transition: color .15s, transform .15s; }
    .card:hover .c-arr { color: var(--accent); transform: translateX(4px); }
    .empty { grid-column:1/-1; text-align:center; padding:80px; font-size:13px; color:var(--dim); font-family:var(--font-mono); }

    /* ══════════════════════════════
       DETAIL
    ══════════════════════════════ */
    #det-view { display: none; }
    #det-view.on { display: block; }

    .art-hero {
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      border-bottom: 1px solid var(--border); padding: 52px 0 0;
    }
    .art-hero-in { max-width: 1100px; margin: 0 auto; padding: 0 48px 36px; }
    .art-eye { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .art-tag {
      font-family: var(--font-mono); font-size: 11px; color: var(--accent);
      border: 1px solid var(--accent-30); padding: 3px 11px;
      border-radius: 3px; letter-spacing: .08em; text-transform: uppercase;
    }
    .art-time { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    .art-seo  {
      font-family: var(--font-mono); font-size: 11px; color: #22c55e;
      border: 1px solid #22c55e30; padding: 3px 9px; border-radius: 3px; display: none;
    }
    .art-hero h1 {
      font-family: var(--font-head); font-size: clamp(24px,3.8vw,44px);
      font-weight: 700; line-height: 1.1; letter-spacing: -.02em;
      margin-bottom: 18px; max-width: 780px;
    }
    .art-exc {
      font-size: 17px; color: var(--text2); line-height: 1.75;
      border-left: 3px solid var(--accent); padding-left: 18px;
      margin-bottom: 26px; max-width: 680px;
    }
    .art-byline {
      display: flex; align-items: center; gap: 14px;
      padding-top: 18px; border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    #art-logo { height: 26px; width: auto; max-width: 100px; object-fit: contain; display: none; }
    .by-info { display: flex; flex-direction: column; gap: 2px; }
    .by-name { font-size: 13px; font-weight: 600; font-family: var(--font-head); }
    .by-date { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    .by-right { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    .by-right span { color: var(--accent); }

    /* Two-col layout: content + TOC */
    .det-layout {
      display: grid; grid-template-columns: 1fr 250px;
      max-width: 1100px; margin: 0 auto;
      padding: 0 48px; gap: 48px; align-items: flex-start;
    }
    .det-main { padding: 44px 0 80px; min-width: 0; }

    /* TOC */
    .toc { position: sticky; top: 76px; padding-top: 44px; }
    .toc-lbl {
      font-family: var(--font-mono); font-size: 10px; color: var(--dim);
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px;
    }
    .toc ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .toc li a {
      display: block; font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 5px 0 5px 12px; border-left: 2px solid var(--border);
      line-height: 1.4; transition: color .15s, border-color .15s;
    }
    .toc li a:hover { color: var(--text); border-color: var(--accent-30); }
    .toc li.act a { color: var(--accent); border-color: var(--accent); }

    /* Article HTML from DB */
    .art-body h1 {
      font-family: var(--font-head); font-size: 28px; font-weight: 700;
      line-height: 1.2; margin: 0 0 20px;
    }
    .art-body h2 {
      font-family: var(--font-head); font-size: 22px; font-weight: 700;
      line-height: 1.25; margin: 40px 0 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      scroll-margin-top: 76px;
    }
    .art-body h3 {
      font-family: var(--font-head); font-size: 17px; font-weight: 700;
      margin: 28px 0 10px; scroll-margin-top: 76px;
    }
    .art-body h4 { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin: 22px 0 8px; color: var(--text2); }
    .art-body p  { font-size: 16px; color: var(--text2); line-height: 1.85; margin-bottom: 18px; }
    .art-body strong { font-weight: 600; color: var(--text); }
    .art-body em     { font-style: italic; }
    .art-body a      { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent-30); }
    .art-body a:hover{ text-decoration-color: var(--accent); }
    .art-body ul, .art-body ol { margin: 0 0 18px; }
    .art-body ul { list-style: none; padding: 0; }
    .art-body ul li {
      position: relative; padding-left: 20px;
      font-size: 16px; color: var(--text2); line-height: 1.8; margin-bottom: 5px;
    }
    .art-body ul li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 600; }
    .art-body ol { padding-left: 22px; }
    .art-body ol li { font-size: 16px; color: var(--text2); line-height: 1.8; margin-bottom: 5px; padding-left: 4px; }
    .art-body hr   { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .art-body blockquote {
      border-left: 4px solid var(--accent); margin: 28px 0;
      padding: 18px 22px; background: var(--bg2); border-radius: 0 8px 8px 0;
      font-style: italic; font-size: 17px; color: var(--text2); line-height: 1.65;
    }
    /* Override inline CTA button styles from DB content */
    .art-body a[style*="background"] {
      background-color: var(--accent) !important;
      color: #fff !important; display: inline-block !important;
      padding: 13px 26px !important; border-radius: 7px !important;
      text-decoration: none !important; font-weight: 700 !important;
      margin-top: 14px; transition: opacity .15s;
    }
    .art-body a[style*="background"]:hover { opacity: .88; }

    /* Related */
    .rel-strip { background: var(--bg2); border-top: 1px solid var(--border); padding: 44px 48px; display: none; }
    .rel-in { max-width: 1100px; margin: 0 auto; }
    .rel-title { font-family: var(--font-head); font-size: 19px; font-weight: 700; margin-bottom: 20px; }
    .rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
    .rel-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: box-shadow .2s, transform .2s; }
    .rel-card:hover { box-shadow: var(--shad-h); transform: translateY(-2px); }
    .rel-tag  { font-family: var(--font-mono); font-size: 10px; color: var(--accent); margin-bottom: 7px; }
    .rel-card h4 { font-family: var(--font-head); font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 7px; }
    .rel-time { font-family: var(--font-mono); font-size: 10px; color: var(--dim); }

    /* Footer */
    .site-foot {
      border-top: 1px solid var(--border); padding: 20px 48px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; background: var(--surface);
    }
    .foot-l { display: flex; align-items: center; gap: 10px; }
    .foot-logo { height: 20px; object-fit: contain; display: none; }
    .foot-txt  { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    .foot-r    { font-family: var(--font-mono); font-size: 11px; color: var(--faint); }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(13px)} to{opacity:1;transform:none} }
    .ani    { animation: fadeUp .36s ease both; }
    .ani-1  { animation-delay: .07s; }
    .ani-2  { animation-delay: .14s; }

    @media (max-width: 900px) { .det-layout { grid-template-columns: 1fr; } .toc { display: none; } }
    @media (max-width: 640px) {
      #hdr,.l-hero,.l-ctrl,.l-main,.art-hero-in,.det-layout,.rel-strip,.site-foot { padding-left:20px;padding-right:20px; }
      .det-main { padding: 32px 0 60px; }
      .feat { grid-template-columns: 1fr; }
      .feat-vis { min-height: 160px; order: -1; }
    }
  </style>
</head>
<body>
  <div id="prog"></div>

  <div id="loading">
    <div class="ring"></div>
    <p id="load-msg">Loading…</p>
  </div>

  <div id="err">
    <h2>Something went wrong</h2>
    <p id="err-msg">Could not load this blog.</p>
    <a href="/">← Go back</a>
  </div>

  <div id="page" style="display:none">

    <!-- HEADER -->
    <header id="hdr">
      <div class="hdr-l">
        <img id="hdr-logo" src="" alt="" />
        <span id="hdr-name"></span>
        <span class="hdr-sep">|</span>
        <span class="hdr-lbl">Blog</span>
      </div>
      <div class="hdr-r">
        <span class="powered">by vudio.ai</span>
        <button id="back-btn" onclick="goList()">← All posts</button>
      </div>
    </header>

    <!-- ══ LISTING ══ -->
    <div id="list-view">
      <div class="l-hero ani">
        <div class="l-eye">
          <div class="l-dot"></div>
          <span id="l-tagline"></span>
        </div>
        <h1 id="l-title">Blog</h1>
        <p id="l-desc"></p>
      </div>

      <div class="l-ctrl ani ani-1">
        <div class="srch">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="srch-inp" placeholder="Search articles…" />
        </div>
        <div id="filters"></div>
      </div>

      <div class="l-main ani ani-2">
        <div id="feat-slot"></div>
        <div class="grid" id="grid"></div>
      </div>

      <footer class="site-foot">
        <div class="foot-l">
          <img class="foot-logo" id="foot-logo" src="" alt=""/>
          <span class="foot-txt" id="foot-txt"></span>
        </div>
        <div class="foot-r">Powered by vudio.ai · All rights reserved</div>
      </footer>
    </div>

    <!-- ══ DETAIL ══ -->
    <div id="det-view">
      <div class="art-hero">
        <div class="art-hero-in ani">
          <div class="art-eye">
            <span class="art-tag" id="a-tag"></span>
            <span class="art-time" id="a-time"></span>
            <span class="art-seo" id="a-seo"></span>
          </div>
          <h1 id="a-title"></h1>
          <p class="art-exc" id="a-exc"></p>
          <div class="art-byline">
            <img id="art-logo" src="" alt=""/>
            <div class="by-info">
              <span class="by-name" id="a-bname"></span>
              <span class="by-date" id="a-bdate"></span>
            </div>
            <div class="by-right"><span>●</span> Powered by vudio.ai</div>
          </div>
        </div>
      </div>

      <div class="det-layout">
        <div class="det-main">
          <div class="art-body" id="art-body"></div>
        </div>
        <aside class="toc">
          <div class="toc-lbl">In this article</div>
          <ul id="toc"></ul>
        </aside>
      </div>

      <div class="rel-strip" id="rel-strip">
        <div class="rel-in">
          <div class="rel-title">More articles</div>
          <div class="rel-grid" id="rel-grid"></div>
        </div>
      </div>

      <footer class="site-foot">
        <div class="foot-l">
          <img class="foot-logo" id="foot-logo-d" src="" alt=""/>
          <span class="foot-txt" id="foot-txt-d"></span>
        </div>
        <div class="foot-r">Powered by vudio.ai · All rights reserved</div>
      </footer>
    </div>

  </div><!-- /#page -->

<script>
/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const R = document.documentElement;

function css(prop, val) { R.style.setProperty(prop, val); }

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function loadGFont(family) {
  if (!family) return;
  const l = document.createElement('link');
  l.rel  = 'stylesheet';
  l.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;600;700;900&display=swap`;
  document.head.appendChild(l);
}

/* ─── Brand name from domain ───
   blog.vudio.ai    → "vudio"
   blog.foxtale.com → "foxtale"
   ?brand=xxx       → "xxx"  (testing)
*/
function getBrandName() {
  const p = new URLSearchParams(location.search).get('brand');
  if (p) return p.toLowerCase();
  const parts = location.hostname.split('.');
  // blog.brandname.com  → parts = ['blog','brandname','com'] → parts[1]
  // blog.brandname.ai   → parts = ['blog','brandname','ai']  → parts[1]
  if (parts.length >= 3 && parts[0] === 'blog') return parts[1].toLowerCase();
  // fallback: vudio-blogs.pages.dev → can't detect, need ?brand=
  return null;
}

/* ─── Route detection ─── */
function getRoute() {
  const path = location.pathname.replace(/\/$/, '');
  if (!path || path === '') return { type: 'list' };
  const slug = path.split('/').filter(Boolean).pop();
  return { type: 'detail', slug };
}

/* ═══════════════════════════════════════════════════
   APPLY BRAND KIT
   Expects: { colors, fonts, logos, tagline, description }
═══════════════════════════════════════════════════ */
function applyKit(kit) {
  const accent = kit.colors?.accent || kit.colors?.primary || '#111111';
  css('--accent',    accent);
  css('--accent-10', accent + '14');
  css('--accent-30', accent + '40');

  if (kit.colors?.background) {
    css('--bg',  kit.colors.background);
    css('--bg2', kit.colors.background);
  }
  if (kit.colors?.secondary) css('--surface', kit.colors.secondary);
  if (kit.colors?.primary)   css('--text',    kit.colors.primary);

  if (kit.fonts?.heading) {
    loadGFont(kit.fonts.heading);
    css('--font-head', `'${kit.fonts.heading}', Georgia, serif`);
  }
  if (kit.fonts?.body) {
    loadGFont(kit.fonts.body);
    css('--font-body', `'${kit.fonts.body}', system-ui, sans-serif`);
  }

  const logo = kit.logos?.primary || kit.logos?.favicon;
  ['hdr-logo','art-logo','foot-logo','foot-logo-d'].forEach(id => {
    const el = $(id); if (!el) return;
    if (logo) { el.src = logo; el.style.display = 'block'; }
  });
  if (!logo) {
    $('hdr-name').textContent    = kit.name || '';
    $('hdr-name').style.display  = 'block';
  }

  $('l-tagline').textContent   = kit.tagline || '';
  $('l-desc').textContent      = kit.description?.slice(0, 160) || '';
  ['foot-txt','foot-txt-d'].forEach(id => {
    const el = $(id); if (el) el.textContent = kit.tagline || '';
  });

  document.title = `${kit.tagline || ''} — Blog`;
  const meta = document.querySelector('meta[name="description"]');
  if (meta) meta.content = kit.description || '';
}

/* ═══════════════════════════════════════════════════
   API
   Kit fetched by brand name; blogs fetched by brand ID
═══════════════════════════════════════════════════ */
let API_BASE = '';

// GET /api/public/brands/:brandName → returns { data: { brand, kit } }
async function apiFetchKit(brandName) {
  const r = await fetch(`${API_BASE}/brands/${brandName}`);
  if (!r.ok) throw new Error(`Brand not found: ${brandName}`);
  return r.json();
}

// GET /api/public/brands/:brandId/blogs?status=published
async function apiFetchBlogs(brandId) {
  const r = await fetch(`${API_BASE}/brands/${brandId}/blogs?status=published`);
  if (!r.ok) throw new Error('Could not fetch blogs');
  const data = await r.json();
  return data.data?.blogs || [];
}

// GET /api/public/brands/:brandId/blogs/:blogSlug
async function apiFetchBlog(brandId, blogSlug) {
  const r = await fetch(`${API_BASE}/brands/${brandId}/blogs/${blogSlug}`);
  if (!r.ok) throw new Error(`Blog not found: ${blogSlug}`);
  const data = await r.json();
  return data.data.blog;
}

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let BRAND_NAME = '';
let BRAND_ID   = '';
let KIT        = null;
let POSTS      = [];
let activeFilter = 'All';
let search       = '';
let progHandler  = null;

/* ═══════════════════════════════════════════════════
   LISTING
═══════════════════════════════════════════════════ */
function buildFilters() {
  const cats = ['All', ...new Set(POSTS.map(p => cap(p.category || p.keyword || 'General')))];
  $('filters').innerHTML = '';
  cats.slice(0, 7).forEach(c => {
    const b = document.createElement('button');
    b.className = 'f-btn' + (c === activeFilter ? ' on' : '');
    b.textContent = c;
    b.onclick = () => { activeFilter = c; buildFilters(); renderList(); };
    $('filters').appendChild(b);
  });
}

function renderList() {
  const f = POSTS.filter(p => {
    const mc = activeFilter === 'All' || cap(p.category||p.keyword||'General') === activeFilter;
    const ms = !search || p.title.toLowerCase().includes(search) || (p.excerpt||'').toLowerCase().includes(search);
    return mc && ms;
  });

  $('feat-slot').innerHTML = '';
  $('grid').innerHTML      = '';

  if (!f.length) { $('grid').innerHTML = '<div class="empty">No articles found.</div>'; return; }

  const [top, ...rest] = f;
  $('feat-slot').appendChild(makeFeat(top));
  rest.forEach((p, i) => {
    const el = makeCard(p);
    el.style.animationDelay = (i * .05) + 's';
    $('grid').appendChild(el);
  });
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function makeFeat(p) {
  const d = document.createElement('div');
  d.className = 'feat';
  const tag = cap(p.category || p.keyword || 'Article');
  d.innerHTML = `
    <div class="feat-body">
      <span class="f-tag">${tag}</span>
      <h2>${p.title}</h2>
      <p>${p.excerpt || ''}</p>
      <div class="feat-meta">
        <span class="f-date">${fmtDate(p.publishedAt)}</span>
        <span class="f-sep">·</span>
        <span class="f-time">${p.readTimeMinutes || '?'} min read</span>
        <span class="f-read">Read article →</span>
      </div>
    </div>
    <div class="feat-vis">
      <span class="new-badge">Latest</span>
      <span class="no-img">✦</span>
    </div>`;
  d.onclick = () => navDetail(p.slug);
  return d;
}

function makeCard(p) {
  const d = document.createElement('div');
  d.className = 'card ani';
  const tag = cap(p.category || p.keyword || 'Article');
  d.innerHTML = `
    <div class="card-img"><span class="card-no-img">✦</span></div>
    <div class="card-body">
      <span class="c-tag">${tag}</span>
      <div class="c-title">${p.title}</div>
      <div class="c-exc">${p.excerpt || ''}</div>
      <div class="c-foot">
        <span class="c-date">${fmtDate(p.publishedAt)} · ${p.readTimeMinutes||'?'} min</span>
        <span class="c-arr">→</span>
      </div>
    </div>`;
  d.onclick = () => navDetail(p.slug);
  return d;
}

/* ═══════════════════════════════════════════════════
   DETAIL
═══════════════════════════════════════════════════ */
async function navDetail(slug) {
  $('load-msg').textContent = 'Loading article…';
  $('loading').style.opacity = '.6';
  $('loading').style.pointerEvents = 'none';
  try {
    const blog = await apiFetchBlog(BRAND_ID, slug);
    showDetail(blog);
    history.pushState({}, '', '/' + slug);
  } catch(e) { showErr('Could not load this article. ' + e.message); }
  finally {
    $('loading').style.opacity = '0';
    $('loading').style.pointerEvents = 'none';
  }
}

function showDetail(blog) {
  const tag  = cap(blog.category || blog.keyword || 'Article');
  const logo = KIT?.logos?.primary || KIT?.logos?.favicon;

  $('a-tag').textContent   = tag;
  $('a-time').textContent  = `${blog.readTimeMinutes || '?'} min read`;
  $('a-title').textContent = blog.title;
  $('a-exc').textContent   = blog.excerpt || '';
  $('a-bname').textContent = KIT?.name || cap(BRAND_NAME) + ' Editorial';
  $('a-bdate').textContent = blog.publishedAt ? `Published ${fmtDate(blog.publishedAt)}` : '';

  if (blog.seoScore) { $('a-seo').textContent = `SEO ${blog.seoScore}`; $('a-seo').style.display = 'inline-block'; }
  if (logo) { $('art-logo').src = logo; $('art-logo').style.display = 'block'; }

  // Inject full HTML content from DB
  $('art-body').innerHTML = blog.content || '<p>No content available.</p>';

  // Table of contents
  const toc = $('toc'); toc.innerHTML = '';
  if (blog.sections?.length) {
    blog.sections.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="#${s.anchor}">${s.heading}</a>`;
      toc.appendChild(li);
    });
    observeTOC();
  }

  // Related posts
  const others = POSTS.filter(p => p.slug !== blog.slug).slice(0, 3);
  if (others.length) {
    $('rel-grid').innerHTML = others.map(p => `
      <div class="rel-card" onclick="navDetail('${p.slug}')">
        <div class="rel-tag">${cap(p.category||p.keyword||'Article')}</div>
        <h4>${p.title}</h4>
        <div class="rel-time">${p.readTimeMinutes||'?'} min read</div>
      </div>`).join('');
    $('rel-strip').style.display = 'block';
  } else { $('rel-strip').style.display = 'none'; }

  $('list-view').classList.remove('on');
  $('det-view').classList.add('on');
  $('back-btn').classList.add('on');
  window.scrollTo({ top: 0 });
  setupProg();
}

function goList() {
  $('det-view').classList.remove('on');
  $('list-view').classList.add('on');
  $('back-btn').classList.remove('on');
  $('rel-strip').style.display = 'none';
  tearProg();
  window.scrollTo({ top: 0 });
  history.pushState({}, '', '/');
}

/* TOC observer */
function observeTOC() {
  const heads = $('art-body').querySelectorAll('h2, h3');
  if (!heads.length) return;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      document.querySelectorAll('#toc li').forEach(li => li.classList.remove('act'));
      const a = document.querySelector(`#toc li a[href="#${e.target.id}"]`);
      if (a) a.closest('li').classList.add('act');
    });
  }, { rootMargin: '-64px 0px -70% 0px' });
  heads.forEach(h => { if (h.id) obs.observe(h); });
}

/* Progress bar */
function setupProg() {
  const bar = $('prog');
  progHandler = () => {
    const el = $('det-view'), top = el.getBoundingClientRect().top;
    const h  = el.scrollHeight - window.innerHeight;
    bar.style.width = Math.min(100, Math.max(0, (-top/h)*100)) + '%';
  };
  window.addEventListener('scroll', progHandler);
}
function tearProg() {
  if (progHandler) window.removeEventListener('scroll', progHandler);
  $('prog').style.width = '0%';
}

/* Search */
$('srch-inp').addEventListener('input', e => { search = e.target.value.toLowerCase().trim(); renderList(); });

/* ═══════════════════════════════════════════════════
   ERROR
═══════════════════════════════════════════════════ */
function showErr(msg) {
  $('loading').classList.add('out');
  $('err-msg').textContent = msg;
  $('err').classList.add('show');
}

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
async function boot() {
  // 1. Detect brand name from domain
  const brand = getBrandName();
  if (!brand) {
    showErr('Could not detect brand name from URL.\nFor testing, add ?brand=vudio to the URL.');
    return;
  }
  BRAND_NAME = brand;

  // 2. Load API base URL from config.json
  try {
    const cfg = await fetch('/config.json').then(r => r.json());
    API_BASE = cfg.apiBase || '';
  } catch(e) {
    showErr('Missing config.json — add your API base URL.');
    return;
  }

  // 3. Fetch brand kit first to get brand ID, then fetch blogs using that ID
  try {
    $('load-msg').textContent = 'Loading brand…';
    const kitResp = await apiFetchKit(brand);
    BRAND_ID = kitResp.data.brand._id;
    KIT = { ...kitResp.data.kit, name: kitResp.data.brand?.name };
    applyKit(KIT);
    $('l-title').textContent = cap(brand) + ' Blog';

    $('load-msg').textContent = 'Loading posts…';
    POSTS = await apiFetchBlogs(BRAND_ID);
  } catch(e) {
    showErr(`API error for brand "${brand}".\n\n${e.message}\n\nMake sure:\n• API is running\n• CORS allows this domain\n• Brand exists in DB`);
    return;
  }

  // 4. Show page
  $('page').style.display = 'block';
  $('loading').classList.add('out');

  // 5. Route
  const route = getRoute();
  if (route.type === 'detail') {
    buildFilters(); renderList();
    $('list-view').classList.add('on');
    await navDetail(route.slug);
  } else {
    buildFilters(); renderList();
    $('list-view').classList.add('on');
  }

  // 6. Browser back/forward
  window.addEventListener('popstate', () => {
    const r = getRoute();
    if (r.type === 'list') goList();
    else navDetail(r.slug);
  });
}

boot();
</script>
</body>
</html>
